name: Bug report
description: Report a problem with Commit Roast
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Prompt, diff shape, language, output mode, or script command.
    validations:
      required: false
