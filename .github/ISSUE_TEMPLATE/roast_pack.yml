name: Roast pack idea
description: Suggest review checks, examples, or tone lines
title: "[Roast pack]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Frontend
        - Backend
        - Database / migrations
        - CI / tooling
        - Tests
        - Security
        - Documentation
        - Tone
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Add the check, example, or line you want included.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why it helps
      description: Explain the real review value behind the joke.
    validations:
      required: true
